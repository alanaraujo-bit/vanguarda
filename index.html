<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VANGUARDA" />
    <meta name="theme-color" content="#05070f" />
    <meta
      name="description"
      content="VANGUARDA — Guerra pelo Núcleo. Estratégia em tempo real no seu navegador."
    />
    <link rel="icon" href="favicon.ico" sizes="48x48" />
    <link rel="icon" href="icon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png" />
    <title>VANGUARDA — Guerra pelo Núcleo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070f;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app canvas {
        display: block;
      }
      /* Tela de carregamento exibida antes do Phaser assumir */
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(ellipse at 50% 40%, #0b1226 0%, #05070f 70%);
        z-index: 10;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }
      #boot-loader.hidden {
        opacity: 0;
      }
      #boot-loader .logo {
        font-family: 'Segoe UI', 'Trebuchet MS', Verdana, sans-serif;
        font-weight: 800;
        font-size: clamp(28px, 6vw, 52px);
        letter-spacing: 0.35em;
        text-indent: 0.35em;
        color: #eaf6ff;
        text-shadow:
          0 0 18px rgba(56, 225, 255, 0.85),
          0 0 60px rgba(56, 225, 255, 0.35);
      }
      #boot-loader .hex {
        width: 54px;
        height: 54px;
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        background: conic-gradient(from 0deg, #38e1ff, #7b5cff, #38e1ff);
        animation: spin 1.1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Aviso de rotação — só em telas de toque em paisagem (o jogo é retrato). */
      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        padding: 24px;
        text-align: center;
        background: radial-gradient(ellipse at 50% 40%, #0b1226 0%, #05070f 70%);
        z-index: 100;
      }
      #rotate-overlay .phone {
        width: 46px;
        height: 76px;
        border: 4px solid #38e1ff;
        border-radius: 10px;
        box-shadow: 0 0 18px rgba(56, 225, 255, 0.6);
        animation: rotate-hint 1.8s ease-in-out infinite;
      }
      #rotate-overlay p {
        font-family: 'Segoe UI', 'Trebuchet MS', Verdana, sans-serif;
        font-weight: 700;
        font-size: clamp(16px, 4vw, 20px);
        letter-spacing: 0.04em;
        color: #eaf6ff;
        max-width: 320px;
      }
      @keyframes rotate-hint {
        0%,
        20% {
          transform: rotate(90deg);
        }
        50%,
        70% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }
      @media (orientation: landscape) and (pointer: coarse) {
        #rotate-overlay {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot-loader">
      <div class="hex"></div>
      <div class="logo">VANGUARDA</div>
    </div>
    <div id="rotate-overlay">
      <div class="phone"></div>
      <p>Gire seu aparelho para o modo retrato para jogar.</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
